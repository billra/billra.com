<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Ray Scaling - Planar Net</title>
    <meta name="version" content="2.1">
    <link rel="stylesheet" href="colorcube.css">
    <script type="module" src="colorcube.js"></script>
</head>
<body>

    <header class="header">
        <h1>RGB Face Net & Ray Scaling <span id="version"></span></h1>
        <p>Hover over the faces to see the calculated hex codes.</p>
    </header>

    <main>
        <section class="controls">
            <label for="intensity">Intensity Ray (N):</label>
            <input type="range" id="intensity" min="0" max="15" step="1" value="15">
            <span id="t-value">F</span>
        </section>

        <canvas id="colorCanvas" aria-label="Interactive 3D representation of an RGB color cube scaling with intensity">
            Your browser does not support the HTML canvas tag or JavaScript is disabled.
        </canvas>

        <div id="pointer-display"></div>
    </main>

</body>
</html>
