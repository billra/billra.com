<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Ray Scaling - Planar Net</title>
    <link rel="stylesheet" href="colorcube.css">
    <script type="module" src="colorcube.js"></script>
</head>
<body>

    <header class="header">
        <h1>RGB Face Net & Ray Scaling</h1>
        <p>Watch the specific #08F marker smoothly scale alongside the primary corners.</p>
    </header>

    <main>
        <section class="controls">
            <label for="intensity">Intensity Ray (t):</label>
            <input type="range" id="intensity" min="0" max="1" step="0.01" value="1.00">
            <span id="t-value">1.00</span>
        </section>

        <canvas id="colorCanvas" aria-label="Interactive 3D representation of an RGB color cube scaling with intensity">
            Your browser does not support the HTML canvas tag or JavaScript is disabled.
        </canvas>
    </main>

</body>
</html>
