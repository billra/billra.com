<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Ray Scaling - Planar Net</title>
    <meta name="version" content="2.4">
    <link rel="stylesheet" href="colorcube.css">
    <script type="module" src="colorcube.js"></script>
</head>
<body>

    <header class="header">
        <h1>RGB Face Net & Ray Scaling <span id="version"></span></h1>
        <p>Click a color to view its intensity ray. Click the core sample to scale.</p>
    </header>

    <main class="layout-container">

        <aside id="core-sample" class="core-sample"></aside>

        <div class="canvas-container">
            <section class="controls">
                <span>Intensity Ray (N): <strong id="t-value">F</strong></span>
                <label for="zoom" style="margin-inline-start: 25px; cursor: pointer;">Zoom:</label>
                <input type="checkbox" id="zoom" style="cursor: pointer;">
            </section>

            <canvas id="colorCanvas" aria-label="Interactive 3D representation of an RGB color cube scaling with intensity">
                Your browser does not support the HTML canvas tag or JavaScript is disabled.
            </canvas>
        </div>

        <div id="pointer-display"></div>
    </main>

</body>
</html>
