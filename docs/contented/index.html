<!DOCTYPE html>
<html>
<head>
    <title>Contented Editor</title>
    <meta name="author" content="Bill Ola Rasmussen">
    <meta name="version" content="3.6">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="contented.ico">
    <link rel="stylesheet" href="contented.css">
    <script defer src="contented.js"></script>
</head>
<body>
    <div id="tab-bar">
        <div id="tab-container"></div>
        <div id="add-tab" title="New Tab">+</div>
        <div class="spacer"></div>
    </div>
    <div id="editor-container"></div>
    <template id="system-tab-template">
        <div class="system-content-wrapper">
            <h1>
                <img src="contented.ico" alt="icon">
                Contented HTML Text Editor
                <span class="small text-muted">v{{VERSION}}</span>
            </h1>

            <p>Type text and paste items from other applications.</p>

            <h2>Keys:</h2>
            <ul>
                <li><b>F1</b> or <b>Escape</b>: Toggle this documentation.</li>
                <li>Ctrl-s (lowercase letter) to save as text, stripping all non-text content.</li>
                <li>Ctrl-S (capital letter) to save as HTML, preserving all content.</li>
                <li><b>Ctrl-o</b>: Open files (auto-detects standard text vs. Contented HTML format).</li>
            </ul>

            <h2>Features:</h2>
            <ul>
                <li>Files saved "as HTML" can be opened in a web browser or reloaded in Contented.</li>
                <li>Most items pasted into the editor retain their original formatting.</li>
                <li>Contents are preserved on F5 page refresh.</li>
                <li>Multiple tabs: <b>Double-click</b> a tab to rename it.</li>
                <li>Keyboard navigation.</li>
                <li>Lightweight and fast, no reliance on external libraries.</li>
            </ul>

            <p>Opening a file saved "as HTML" by Contented will restore the
            entire contents of the editor. Opening a normal ".html" file (or any
            other file) allows you to edit that file as a plain text file.
            Contented looks at the first line of the file to make this
            determination.</p>

            <p>When saving, files are written immediately or a dialog is displayed
               allowing the name to be changed. This behavior is controlled by the browser:
            <br>• Chrome setting: <i>"Ask where to save each file before downloading"</i>.
            <br>• FireFox setting: <i>"Always ask you where to save files"</i>.</p>

            <p>Be contented.</p>
        </div>
    </template>
</body>
</html>
